referrals:
  title: 推薦連結
  description: 這些連結是我推薦的產品與服務的推薦連結。如果你對這些產品有興趣，歡迎使用我的推薦連結註冊，這樣可以同時支持服務，我也能獲得提成。
  register-now: "立刻註冊 →"
  zeabur:
    title: Zeabur
    description: Zeabur是一個由AI驅動，幫助您將寫好的程式碼部署上線，而無需擔憂伺服器設定、資安和CI/CD設定。Zeabur的AI會替您分析程式碼並自動撰寫Dockerfile，瞬間將應用程式部署至全託管平台；提供多個部署區域，無論受眾位於何處，都能快速瀏覽您的網站。我們也內建資料庫、InsForge（Supabase的替代方案）、WAF資安防護及AI Hub API，給您零設定、完全安心的部署體驗。
  bunny-cdn:
    title: Bunny CDN
    description: 體驗全方位的邊緣平台，包含有台灣節點的低延遲CDN、高速儲存空間、具備負載平衡的智慧DNS，以及強大的WAF資安防護，且所有功能皆可高度自訂。告別Cloudflare的僵化合約與緩慢客服，享受「用多少付多少」的完全自由，以及一個隨時為您提供協助的支援團隊。
